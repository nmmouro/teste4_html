<style>

/* ================= ROOT ================= */

:root{

/* ================= BASE ================= */

*{
  box-sizing:border-box;
}

html,body{

  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,Arial,sans-serif;

header{

main{

}

.card{
  background:rgba(11,26,58,.94);

  border-radius:16px;

  border:1px solid rgba(255,255,255,.08);

  box-shadow:0 6px 20px rgba(0,0,0,.25);

  backdrop-filter:blur(8px);

  overflow:auto;
}

.card h2{
  margin:0;
  padding:16px;

  text-align:center;

  color:var(--accent);

  font-size:24px;

  border-bottom:1px solid rgba(255,255,255,.08);
}

/* ================= TABLE ================= */

table{
  width:max-content;
  min-width:100%;
  border-collapse:collapse;
}

thead th{
  position:sticky;
  top:0;

  z-index:2;

  background:var(--header);

  color:#fff;

  padding:12px;

  border:1px solid var(--border);

  user-select:none;
}

tbody{
  transition:opacity .2s;
}

tbody td{
  padding:12px;

  text-align:center;

  border:1px solid var(--border);

  background:var(--table);

  background:#163067;
}

th{

  position:absolute;
  top:0;
  right:0;

  width:6px;

  cursor:col-resize;

  transition:.2s;

.resizer:hover{

}

/* ================= STATUS COLORS ================= */

}

}

tr.status-cancelado td{

}

td.status-icon{
  width:60px;

}

/* ================= FOOTER ================= */

.small{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  padding:10px;
}

/* ================= RESPONSIVO ================= */

@media(max-width:1200px){

  header{
    grid-template-columns:1fr;
    text-align:center;
  }

  .logo{
    margin:auto;

  .right{
    justify-content:center;
  }

  }

    font-size:20px;
  }

</style>
</head>

<body>

<audio id="beep" preload="auto">
  <source src="alerta.mp3" type="audio/mpeg">
</audio>

<header>

  <img
    src="logo.png"
    class="logo"
    onerror="this.style.display='none'"
  >

  <div class="center">

    <div class="title">
      MOVIMENTAÇÃO DIÁRIA
    </div>

    <div id="status-empregados"></div>

  </div>

  <div class="right">

    <div class="clock" id="clock"></div>

    <button
      id="toggle-audio"
      onclick="toggleAudio()"
    >
      🔊 SOM: ON
    </button>

    <button
      id="install-app"
      style="display:none;"
    >
      📲 INSTALAR APP
    </button>

    <button onclick="toggleFullscreen()">
      ⛶ TELA CHEIA
    </button>

  </div>

</header>

<main>

  <section class="card">
    <h2>PAINEL</h2>
    <div id="painel">Carregando...</div>
  </section>

  <section class="card">
    <h2>AGENDA DO DIA</h2>
    <div id="agenda">Carregando...</div>
  </section>

  <section class="card">
    <h2>AGENDA SERVIÇO SOCIAL</h2>
    <div id="social">Carregando...</div>
  </section>

</main>

<div class="small">
  Atualização automática a cada 30 segundos • Google Sheets
</div>

<script>

/* ================= CONFIG ================= */

const SHEET_ID =
"1Ch3AjQ0MDo4WuQWFDR3r8nZrHb4yQkSLOtT5_QgxT6E";

const TABS = [
  { id:"painel", name:"PAINEL" },
  { id:"agenda", name:"AGENDA DO DIA" },
  { id:"social", name:"AGENDA SERVIÇO SOCIAL" }
];

/* ================= HEADERS ================= */

const TABLE_HEADERS = {

  painel:[
    "Data",
    "Hora",
    "Veículo",
    "Empregado",
    "Passageiro/Motivo",
    "Itinerário",
    "Status"
  ],

  agenda:[
    "Data",
    "Hora",
    "Passageiro",
    "Setor",
    "Motivo",
    "Itinerário",
    "Status"
  ],

  social:[
    "Data",
    "Período",
    "Passageiro",
    "Motivo",
    "Itinerário",
    "Status"
  ]
};

/* ================= COLUMN WIDTHS ================= */

const COLUMN_WIDTHS = {

  painel:[
    "50px",
    "90px",
    "160px",
    "160px",
    "260px",
    "320px",
    "70px"
  ],

  agenda:[
    "50px",
    "90px",
    "180px",
    "140px",
    "260px",
    "320px",
    "70px"
  ],

  social:[
    "50px",
    "120px",
    "180px",
    "260px",
    "320px",
    "70px"
  ]
};

/* ================= AUDIO ================= */

let audioUnlocked = false;

let lastDataHash = null;

let firstLoad = true;

let soundEnabled =
localStorage.getItem("sound") !== "off";

const audio =
document.getElementById("beep");

function updateSoundButton(){

  const btn =
  document.getElementById("toggle-audio");

  if(soundEnabled){

    btn.innerText = "🔊 SOM: ON";

    btn.classList.remove("off");

  }else{

    btn.innerText = "🔇 SOM: OFF";

    btn.classList.add("off");
  }
}

function toggleAudio(){

  soundEnabled = !soundEnabled;

  localStorage.setItem(
    "sound",
    soundEnabled ? "on" : "off"
  );

  updateSoundButton();
}

async function unlockAudio(){

  if(audioUnlocked) return;

  try{

    const p = audio.play();

    if(p !== undefined){

      p.then(()=>{

        audio.pause();

        audio.currentTime = 0;

        audioUnlocked = true;

      });

    }

  }catch(err){

    console.warn(err);

  }
}

["click","touchstart","keydown"].forEach(evt=>{

  document.addEventListener(
    evt,
    unlockAudio,
    { once:true }
  );

});

function playBeep(){

  if(!audioUnlocked || !soundEnabled)
    return;

  audio.currentTime = 0;

  audio.play().catch(()=>{});
}

/* ================= CLOCK ================= */

function updateClock(){

  const now = new Date();

  document.getElementById("clock").innerText =
    now.toLocaleDateString("pt-BR")
    + " — " +
    now.toLocaleTimeString("pt-BR");
}

setInterval(updateClock,1000);

updateClock();

/* ================= HELPERS ================= */

const parseGviz = text =>
JSON.parse(
  text.substring(
    text.indexOf("{"),
    text.lastIndexOf("}") + 1
  )
);

const escapeHtml = s =>
String(s ?? "")
.replace(/[&<>]/g,m=>({
  "&":"&amp;",
  "<":"&lt;",
  ">":"&gt;"
}[m]));

const formatCell = c =>
c == null
? ""
: (typeof c === "object"
? (c.f ?? c.v ?? "")
: String(c));

function generateCleanHash(results){

  return JSON.stringify(

    results.map(r=>

      r.table.rows.map(row=>

        (row.c || []).map(
          c => c?.f ?? c?.v ?? ""
        )

      )

    )

  );
}

/* ================= RENDER ================= */

function renderTable(id,g){

  const el = document.getElementById(id);

  if(!g?.table?.rows){

    el.innerHTML = "Sem dados";

    return;
  }

  const rows = g.table.rows;

  const headers = TABLE_HEADERS[id];

  const savedWidths =
    JSON.parse(
      localStorage.getItem("widths_"+id)
    ) || COLUMN_WIDTHS[id];

  let h = `
  <table id="table-${id}">

    <colgroup>
  `;

  savedWidths.forEach(w=>{

    h += `<col style="width:${w}">`;

  });

  h += `
    </colgroup>

    <thead>
      <tr>
  `;

  headers.forEach((col,index)=>{

    h += `
    <th>

      ${col}

      <div
        class="resizer"
        data-table="${id}"
        data-index="${index}">
      </div>

    </th>
    `;

  });

  h += "</tr></thead><tbody>";

  rows.forEach(r=>{

    const cells = r.c || [];

    const valores = cells.map(
      c => (c?.f ?? c?.v ?? "")
      .toString()
      .trim()
    );

    if(valores.join("") === "")
      return;

    const status =
    (valores.at(-1) || "")
    .toLowerCase();

    let cls = "";

    if(status.includes("cancelado"))
      cls = "status-cancelado";

    else if(status.includes("concluido"))
      cls = "status-concluido";

    else if(status.includes("andamento"))
      cls = "status-andamento";

    else if(status.includes("atendido"))
      cls = "status-atendido";

    h += `<tr class="${cls}">`;

    cells.forEach((c,i)=>{

      if(i === cells.length-1){

        let icon = "";

        if(
          status.includes("concluido")
          || status.includes("atendido")
        ){
          icon = "✔";
        }
        else if(status.includes("cancelado")){
          icon = "✖";
        }
        else if(status.includes("andamento")){
          icon = "⏳";
        }

        h += `
        <td class="status-icon">
          ${icon}
        </td>
        `;

      }else{

        h += `
        <td>
          ${escapeHtml(formatCell(c))}
        </td>
        `;
      }

    });

    h += "</tr>";

  });

  h += "</tbody></table>";

  el.innerHTML = h;

  initColumnResize(id);
}

/* ================= RESIZE ================= */

function initColumnResize(tableId){

  const table =
  document.getElementById(
    "table-"+tableId
  );

  if(!table) return;

  const cols =
  table.querySelectorAll("col");

  const resizers =
  table.querySelectorAll(".resizer");

  resizers.forEach(resizer=>{

    resizer.addEventListener(
      "mousedown",
      initResize
    );

  });

  function initResize(e){

    e.preventDefault();

    const index =
    Number(
      e.target.dataset.index
    );

    const startX = e.pageX;

    const col = cols[index];

    const startWidth =
    parseInt(
      window.getComputedStyle(col).width,
      10
    );

    function resize(e){

      const width =
      startWidth + (
        e.pageX - startX
      );

      col.style.width =
      width + "px";
    }

    function stopResize(){

      document.removeEventListener(
        "mousemove",
        resize
      );

      document.removeEventListener(
        "mouseup",
        stopResize
      );

      saveWidths();
    }

    document.addEventListener(
      "mousemove",
      resize
    );

    document.addEventListener(
      "mouseup",
      stopResize
    );
  }

  function saveWidths(){

    const widths = [];

    cols.forEach(col=>{

      widths.push(
        window.getComputedStyle(col)
        .width
      );

    });

    localStorage.setItem(
      "widths_"+tableId,
      JSON.stringify(widths)
    );
  }
}

/* ================= FETCH ================= */

async function fetchSheet(tab){

  const url =
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`
  + `?sheet=${encodeURIComponent(tab)}`
  + `&tqx=out:json`
  + `&nocache=${Date.now()}`;

  const r = await fetch(url,{
    cache:"no-store"
  });

  return parseGviz(await r.text());
}

/* ================= STATUS ================= */

function atualizarStatusEmpregados(g){

  const nomes = [
    "CACIO",
    "CELSO",
    "NEI"
  ];

  const status = {};

  nomes.forEach(n=>status[n]=false);

  const rows = g?.table?.rows || [];

  rows.forEach(r=>{

    const cells = r.c || [];

    const empregado =
    String(cells[3]?.f ?? cells[3]?.v ?? "")
    .toUpperCase()
    .trim();

    const situacao =
    String(cells[6]?.f ?? cells[6]?.v ?? "")
    .toLowerCase()
    .trim();

    const ativo =
    situacao.includes("andamento");

    if(ativo && nomes.includes(empregado)){

      status[empregado] = true;
    }

  });

  const el =
  document.getElementById(
    "status-empregados"
  );

  let html = "";

  nomes.forEach(nome=>{

    html += status[nome]

    ? `<span class="ocupado">${nome} (OCUPADO)</span>`

    : `<span class="livre">${nome} (LIVRE)</span>`;

  });

  el.innerHTML = html;
}

/* ================= LOAD ================= */

async function loadAll(){

  try{

    const results =
    await Promise.all(

      TABS.map(
        t => fetchSheet(t.name)
      )

    );

    const currentHash =
    generateCleanHash(results);

    if(
      !firstLoad
      && lastDataHash
      && currentHash !== lastDataHash
    ){
      playBeep();
    }

    firstLoad = false;

    lastDataHash = currentHash;

    renderTable("painel",results[0]);

    renderTable("agenda",results[1]);

    renderTable("social",results[2]);

    atualizarStatusEmpregados(results[0]);

  }catch(e){

    console.error(e);

  }
}

/* ================= FULLSCREEN ================= */

function toggleFullscreen(){

  if(!document.fullscreenElement){

    document.documentElement
    .requestFullscreen?.();

  }else{

    document.exitFullscreen?.();

  }
}

/* ================= INSTALL PWA ================= */

let deferredPrompt;

const installBtn =
document.getElementById("install-app");

window.addEventListener(
"beforeinstallprompt",
e=>{

  e.preventDefault();

  deferredPrompt = e;

  installBtn.style.display =
  "inline-block";
});

installBtn.addEventListener(
"click",
async ()=>{

  if(!deferredPrompt) return;

  deferredPrompt.prompt();

  await deferredPrompt.userChoice;

  deferredPrompt = null;

  installBtn.style.display =
  "none";
});

window.addEventListener(
"appinstalled",
()=>{

  installBtn.style.display =
  "none";
});

/* ================= START ================= */

loadAll();

updateSoundButton();

setInterval(loadAll,30000);

/* ================= SERVICE WORKER ================= */

if("serviceWorker" in navigator){

  navigator.serviceWorker
  .register("service-worker.js")
  .then(()=>console.log("PWA ativa"))
  .catch(err=>console.log(err));
}

</script>

</body>
</html>
